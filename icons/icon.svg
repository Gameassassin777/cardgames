<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c27a"/>
      <stop offset="0.45" stop-color="#ee9a59"/>
      <stop offset="1" stop-color="#c7693f"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a93a6"/>
      <stop offset="1" stop-color="#0a3a44"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="96"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#sky)"/>
    <!-- sun -->
    <circle cx="256" cy="172" r="64" fill="#fff0cf"/>
    <!-- distant hills -->
    <path d="M0 300 Q120 240 256 290 Q400 250 512 300 L512 330 L0 330 Z" fill="#7d4a2b" opacity="0.55"/>
    <!-- water -->
    <rect x="0" y="312" width="512" height="200" fill="url(#water)"/>
    <!-- sun reflection -->
    <g fill="#ffe7b0" opacity="0.5">
      <rect x="232" y="324" width="48" height="8" rx="4"/>
      <rect x="224" y="344" width="64" height="8" rx="4"/>
      <rect x="236" y="364" width="40" height="8" rx="4"/>
    </g>
    <!-- pine trees left -->
    <g fill="#244a32">
      <path d="M86 300 l30 -70 l30 70 Z"/>
      <path d="M92 270 l24 -56 l24 56 Z"/>
      <path d="M98 244 l18 -44 l18 44 Z"/>
    </g>
    <!-- cabin -->
    <g>
      <rect x="300" y="232" width="120" height="78" fill="#6b4326"/>
      <path d="M290 234 L360 188 L430 234 Z" fill="#8a3a26"/>
      <rect x="346" y="262" width="34" height="48" fill="#3a2415"/>
      <rect x="392" y="252" width="22" height="22" fill="#ffd98a"/>
      <rect x="312" y="252" width="22" height="22" fill="#ffd98a"/>
    </g>
    <!-- pine trees right -->
    <g fill="#1f4029">
      <path d="M446 312 l26 -60 l26 60 Z"/>
      <path d="M452 286 l20 -46 l20 46 Z"/>
    </g>
    <!-- canoe -->
    <path d="M150 420 q90 40 210 0 q-95 26 -210 0 Z" fill="#caa15e"/>
    <path d="M150 420 q90 44 210 0" fill="none" stroke="#7a5a2c" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
