<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d4f5c" />
  <meta name="description" content="Lake House Card Games — a cozy PWA of party card games, including Cards Against Monkeys." />
  <title>Lake House Card Games</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lake House" />
  
  <!-- Premium Typography Integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <!-- Cache-bust recovery: runs before ES modules so a broken cached version
       can't block its own update. Bumped alongside APP_VERSION each release. -->
  <script>
  (function(){
    var V="116";
    if(localStorage.getItem("lh_cleared")!==V&&"serviceWorker"in navigator){
      navigator.serviceWorker.getRegistrations().then(function(r){
        return Promise.all(r.map(function(s){return s.unregister();}));
      }).then(function(){return caches.keys();}).then(function(k){
        return Promise.all(k.map(function(c){return caches.delete(c);}));
      }).then(function(){
        localStorage.setItem("lh_cleared",V);
        location.reload(true);
      }).catch(function(){});
    }
  })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
